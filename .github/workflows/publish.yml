name: Publish Python Package to PyPI

# This workflow runs on every push to a tag that starts with 'v'
on:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    # Add a permission to fetch the OIDC token for trusted publishing
    permissions:
      id-token: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build

    - name: Build package
      run: python -m build

    - name: Publish package to PyPI
      # This action is the standard for publishing to PyPI.
      # It uses OIDC for trusted, passwordless publishing.
      uses: pypa/gh-action-pypi-publish@release/v1